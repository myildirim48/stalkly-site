<!doctype html>
<!--
  Stalkly invite landing page. Deploy to the stalkly-site repo as `invite.html`.
  Flow: read ?c=<inviterCode> → log the click to Supabase (ref-click) → on the
  user's tap, copy the code to the clipboard and send them to the App Store.
  The freshly installed app reads the clipboard once on first launch and
  auto-redeems the code (deferred deep link) — no typing required.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stalkly — You've got free Premium days</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:#0d0b12; color:#f4f0f6; text-align:center; padding:24px; }
  .card { max-width:360px; }
  .gift { font-size:64px; }
  h1 { font-size:22px; margin:16px 0 8px; }
  p { color:#b8b0c2; line-height:1.5; margin:0 0 24px; }
  .cta { display:inline-block; background:#e0457b; color:#fff; text-decoration:none;
         font-size:17px; font-weight:600; padding:15px 34px; border-radius:999px; border:0; cursor:pointer; }
  .note { margin-top:16px; font-size:13px; color:#7d7590; }
</style>
</head>
<body>
  <div class="card">
    <div class="gift">🎁</div>
    <h1>Your friend sent you free Premium</h1>
    <p>Tap below to install Stalkly. Your Premium days unlock automatically the first time you open the app.</p>
    <button class="cta" id="go">Get the app</button>
    <div class="note" id="note"></div>
  </div>

<script>
  var SUPABASE_URL = "https://ikygxkqssjxacuxumdvx.supabase.co";
  var ANON_KEY = "sb_publishable_D4vQ7QdyVJEI8a6rPz-KMg_sQwOBsq8";
  var APP_STORE = "https://apps.apple.com/app/id6788040505";

  function param(name) {
    return new URLSearchParams(window.location.search).get(name) || "";
  }
  var code = param("c").trim().toLowerCase();

  // Log the click (top of the referral funnel). Fire-and-forget; failure is fine.
  if (code) {
    fetch(SUPABASE_URL + "/functions/v1/ref-click", {
      method: "POST",
      headers: { "content-type": "application/json", "apikey": ANON_KEY,
                 "authorization": "Bearer " + ANON_KEY },
      body: JSON.stringify({ inviterCode: code })
    }).catch(function () {});
  }

  // On the user's tap: copy the code (deferred deep link), then go to the store.
  document.getElementById("go").addEventListener("click", function () {
    function proceed() { window.location.href = APP_STORE; }
    if (code && navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(code).then(proceed, proceed);
    } else {
      proceed();
    }
  });

  if (!code) { document.getElementById("note").textContent = "Invite code missing — you can still install the app."; }
</script>
</body>
</html>
