<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stalkly Story — Contact</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; background:#140a16; color:#f3e9ef; font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:560px; margin:0 auto; padding:40px 22px 80px; }
  h1 { font-size:30px; margin:0 0 6px; }
  p.muted { color:#b79fac; font-size:14px; }
  label { display:block; margin:16px 0 6px; font-weight:600; }
  input, textarea { width:100%; box-sizing:border-box; background:#20121f; color:#f3e9ef;
    border:1px solid #3a2436; border-radius:12px; padding:12px 14px; font:inherit; }
  textarea { min-height:140px; resize:vertical; }
  button { margin-top:22px; width:100%; background:#e64c86; color:#fff; border:0; border-radius:999px;
    padding:14px; font:600 17px/1 inherit; cursor:pointer; }
  a { color:#ff8fb3; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Contact us</h1>
  <p class="muted">Questions, bugs, or feedback about Stalkly Story? Send us a message and your mail
  app will open with it ready to send.</p>

  <form id="f" onsubmit="return send(event)">
    <label for="name">Name</label>
    <input id="name" name="name" autocomplete="name" required>
    <label for="email">Your email</label>
    <input id="email" name="email" type="email" autocomplete="email" required>
    <label for="msg">Message</label>
    <textarea id="msg" name="msg" required></textarea>
    <button type="submit">Send message</button>
  </form>

  <p class="muted" style="margin-top:24px">Or email us directly at
  <a href="mailto:muhammedyildirim48@gmail.com">muhammedyildirim48@gmail.com</a>.</p>
  <p class="muted"><a href="index.html">← Stalkly Story</a> · <a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a></p>
</div>
<script>
function send(e){
  e.preventDefault();
  var n=document.getElementById('name').value;
  var em=document.getElementById('email').value;
  var m=document.getElementById('msg').value;
  var body='From: '+n+' <'+em+'>\n\n'+m;
  window.location.href='mailto:muhammedyildirim48@gmail.com'
    +'?subject='+encodeURIComponent('Stalkly contact from '+n)
    +'&body='+encodeURIComponent(body);
  return false;
}
</script>
</body>
</html>
